<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Discovery</title>
    
    <!-- Phosphor Icons for crisp SVG icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Main Stylesheet (No changes needed here!) -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        
        <!-- Header Section -->
        <header class="header">
            <div class="header-left">
                <div class="logo-box">
                    <i class="ph ph-briefcase"></i>
                </div>
                <div>
                    <h1 class="app-title">Job Discovery</h1>
                    <p class="app-subtitle">Find your dream career</p>
                </div>
            </div>
            <div class="header-right">
                <button class="btn btn-outline" id="bookmarks-btn">
                    <i class="ph-fill ph-bookmark" style="color: var(--bookmark-icon);"></i>
                    Bookmarks (<span id="bookmark-count">0</span>)
                </button>
            </div>
        </header>

        <!-- Search & Filters Container -->
        <section class="search-container">
            <div class="search-row">
                <div class="input-group full-width">
                    <i class="ph ph-magnifying-glass"></i>
                    <input type="text" id="search-input" placeholder="Search by job title, company, or keywords...">
                </div>
            </div>
            <div class="search-row bottom-row">
                <div class="input-group location-input">
                    <i class="ph ph-map-pin"></i>
                    <input type="text" id="location-input" placeholder="Filter by location...">
                </div>
                <div class="type-filters" id="type-filters">
                    <!-- Added data-type attributes for easier javascript selection -->
                    <button class="filter-pill" data-type="All">All</button>
                    <button class="filter-pill active" data-type="Full-time">Full-time</button>
                    <button class="filter-pill" data-type="Part-time">Part-time</button>
                    <button class="filter-pill" data-type="Contract">Contract</button>
                    <button class="filter-pill" data-type="Remote">Remote</button>
                </div>
            </div>
        </section>

        <!-- Main Content Area -->
        <main class="main-content">
            <div class="results-header">
                <p class="results-count">Showing <span class="highlight" id="results-count-text">0</span> jobs</p>
                <button class="clear-filters" id="clear-filters" style="display: none;">Clear all filters</button>
            </div>
            
            <div class="active-filters">
                <div class="active-tag" id="active-type-tag">
                    Type: <span id="active-type-name">Full-time</span>
                    <button class="remove-tag" id="remove-type-filter"><i class="ph ph-x"></i></button>
                </div>
            </div>

            <!-- Job Grid (Will be injected by our new JS file to allow dynamic filtering) -->
            <div class="job-grid" id="job-grid">
                <!-- Cards render here dynamically! -->
            </div>
        </main>
    </div>

    <!-- Features Script Link Added Back -->
    <script src="script.js"></script>
</body>
</html>
